name: Deploy Studio Dashboard to SWA

on:
  push:
    branches: [main]
    paths:
      - 'studio-agent-dashboard/**'
      - '.github/workflows/deploy-studio-dashboard-swa.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.VITE_AZURE_AD_TENANT_ID }}
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.VITE_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_API_SCOPE: ${{ secrets.VITE_AZURE_AD_API_SCOPE }}
          VITE_AZURE_AD_REDIRECT_URI: https://www.mystudioagent.ai
          VITE_HUB_API_BASE: ${{ secrets.VITE_HUB_API_BASE }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STUDIO }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: studio-agent-dashboard
          output_location: dist
