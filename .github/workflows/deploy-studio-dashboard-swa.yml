name: Deploy Studio Dashboard to SWA

on:
  push:
    branches: [main]
    paths:
      - 'studio-agent-dashboard/**'
      - '.github/workflows/deploy-studio-dashboard-swa.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio-agent-dashboard/package-lock.json

      - name: Install deps
        working-directory: studio-agent-dashboard
        run: npm ci

      - name: Build
        working-directory: studio-agent-dashboard
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_HUB_API_BASE: ${{ secrets.VITE_HUB_API_BASE }}
          VITE_AUTH_MODE: ${{ secrets.VITE_AUTH_MODE != '' && secrets.VITE_AUTH_MODE || 'msal' }}
          VITE_AZURE_AD_TENANT_ID: ${{ secrets.VITE_AZURE_AD_TENANT_ID }}
          VITE_AZURE_AD_CLIENT_ID: ${{ secrets.VITE_AZURE_AD_CLIENT_ID }}
          VITE_AZURE_AD_API_SCOPE: ${{ secrets.VITE_AZURE_AD_API_SCOPE }}
          VITE_AZURE_AD_REDIRECT_URI: https://www.mystudioagent.ai

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STUDIO }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: studio-agent-dashboard/dist
          skip_app_build: true
